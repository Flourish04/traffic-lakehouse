connector.name=iceberg

# REST Catalog (không cần Hive Metastore)
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181

# Bật native S3 cho Trino
fs.native-s3.enabled=true

# SeaweedFS S3 endpoint - Set via environment variable S3_ENDPOINT
# Example: s3.endpoint=http://192.168.10.2:8333
s3.endpoint=${S3_ENDPOINT}
s3.region=${S3_REGION:-us-east-1}
s3.path-style-access=true

# Credentials - MUST match SeaweedFS s3.json configuration
# Set via environment variables: S3_ACCESS_KEY, S3_SECRET_KEY
s3.aws-access-key=${S3_ACCESS_KEY}
s3.aws-secret-key=${S3_SECRET_KEY}
